name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ConnectWise-Manage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Create release artifact
        run: |
          mkdir -p release-artifact
          cp -r dist release-artifact/
          cp -r node_modules release-artifact/
          cp package.json release-artifact/
          cd release-artifact
          zip -r ../connectwise-mcp-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ConnectWise-Manage/connectwise-mcp-${{ github.ref_name }}.zip
            ConnectWise-Manage/deploy/install.ps1
            ConnectWise-Manage/deploy/uninstall.ps1
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
